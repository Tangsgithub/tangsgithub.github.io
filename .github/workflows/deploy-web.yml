name: 自动部署静态网页 # 机器人的名字

on:
  push:
    branches: ["main"] # 触发条件：只要有人往 main (主分支) 里推代码，就开工

# 权限设置：机器人要发网站，需要你给它开通这三个权限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy_website: # 任务名称
    environment:
      name: github-pages # 告诉 GitHub 这是发到 Pages 上的
      url: ${{ steps.deployment.outputs.page_url }} # 自动获取生成后的网址
    runs-on: ubuntu-latest # 给机器人发一台电脑

    steps: # 机器人干活的具体步骤
      - name: 第一步：去仓库里把你的代码拿出来
        uses: actions/checkout@v4

      - name: 第二步：配置 GitHub Pages 环境
        uses: actions/configure-pages@v5

      - name: 第三步：把你写的网页文件打包
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 把当前仓库里的所有东西（也就是那个 index.html）都打包

      - name: 第四步：正式发布到网站上！
        id: deployment
        uses: actions/deploy-pages@v4
